{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<div class="add-expense-page">
    <h1>Edit Expense</h1>

    <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" name="amount"
                   class="form-input"
                   step="0.01" min="0.01"
                   value="{{ form.amount if form else expense.amount }}"
                   placeholder="0.00" required>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-input" required>
                <option value="" disabled>Select a category</option>
                {% for c in categories %}
                <option value="{{ c }}"
                    {% if form %}
                        {% if form.category == c %}selected{% endif %}
                    {% else %}
                        {% if expense.category == c %}selected{% endif %}
                    {% endif %}>
                    {{ c }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date"
                   class="form-input"
                   value="{{ form.date if form else expense.date }}"
                   required>
        </div>

        <div class="form-group">
            <label for="description">Description <span class="optional-label">(optional)</span></label>
            <input type="text" id="description" name="description"
                   class="form-input"
                   maxlength="200"
                   value="{{ form.description if form else expense.description }}"
                   placeholder="e.g. Lunch at cafe">
        </div>

        <button type="submit" class="btn-submit">Save Changes</button>
    </form>

    <a href="{{ url_for('profile') }}" class="cancel-link">Cancel</a>
</div>
{% endblock %}
